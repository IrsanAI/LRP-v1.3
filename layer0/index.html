<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IrsanAI · Layer-0 · Intent Clarity</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #080C18; min-height: 100vh; }
    textarea::placeholder, input::placeholder { color: #4A5270; }
    button:hover:not(:disabled) { opacity: 0.82; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: #0E1428; } ::-webkit-scrollbar-thumb { background: #1E2540; border-radius: 2px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

const C = { bg:"#080C18", surface:"#0E1428", surfaceHigh:"#141B35", border:"#1E2540", primary:"#7C6EFF", accent:"#FF9557", teal:"#4ECDC4", text:"#F0F0FA", muted:"#6B7492", danger:"#FF6B6B" };

function useTypewriter(text, speed, start) {
  const [displayed, setDisplayed] = useState("");
  const [done, setDone] = useState(false);
  useEffect(() => {
    if (!start) return;
    setDisplayed(""); setDone(false); let i = 0;
    const t = setInterval(() => { i++; setDisplayed(text.slice(0,i)); if(i>=text.length){setDone(true);clearInterval(t);} }, speed||30);
    return () => clearInterval(t);
  }, [text, start]);
  return { displayed, done };
}

function Waveform({ clarity }) {
  const bars = 28;
  return (
    <div style={{display:"flex",alignItems:"center",gap:"3px",height:"28px"}}>
      {Array.from({length:bars},(_,i) => {
        const pos=i/bars, filled=pos*100<(clarity||0);
        const h=filled?Math.sin(pos*Math.PI)*20+6:Math.abs(Math.sin(i*1.3+0.5))*8+4;
        return <div key={i} style={{width:"3px",height:`${h}px`,background:filled?C.primary:C.border,borderRadius:"2px",transition:"all 0.4s ease",opacity:filled?1:0.35}} />;
      })}
    </div>
  );
}

async function callClaude(system, user, log) {
  const url = window.location.origin + "/.netlify/functions/claude-proxy";
  log(`→ POST ${url}`);
  let res;
  try {
    res = await fetch(url, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system,messages:[{role:"user",content:user}]})
    });
  } catch (netErr) {
    log(`✗ NETZWERKFEHLER: ${netErr.message}`);
    throw new Error(`Netzwerkfehler: ${netErr.message}`);
  }
  const raw = await res.text();
  log(`← Status ${res.status} ${res.statusText}`);
  log(`← Rohantwort (${raw.length} Zeichen): ${raw.slice(0,400)}${raw.length>400?" …":""}`);
  if(!res.ok) {
    let msg = `HTTP ${res.status}`;
    try { const e=JSON.parse(raw); msg = (typeof e.error==="string"?e.error:e?.error?.message) || msg; } catch(_){}
    log(`✗ FEHLER (HTTP ${res.status}): ${msg}`);
    throw new Error(msg);
  }
  let data;
  try { data = JSON.parse(raw); }
  catch(parseErr) { log(`✗ JSON-PARSE-FEHLER (Antwort): ${parseErr.message}`); throw new Error(`Antwort kein gültiges JSON: ${parseErr.message}`); }
  const text = data.content?.map(b=>b.text||"").join("") || "";
  log(`← Modelltext (${text.length} Zeichen): ${text.slice(0,300)}${text.length>300?" …":""}`);
  const cleaned = text.replace(/```json|```/g,"").trim();
  try { return JSON.parse(cleaned); }
  catch(parseErr2) { log(`✗ JSON-PARSE-FEHLER (Inhalt): ${parseErr2.message}`); throw new Error(`Konnte Modell-Antwort nicht parsen: ${parseErr2.message}`); }
}

const iStyle = {width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:"8px",color:C.text,fontSize:"15px",padding:"14px 16px",outline:"none",lineHeight:1.6,fontFamily:"inherit",transition:"border-color 0.2s"};
const bPrimary = (d) => ({background:d?C.surface:C.primary,color:d?C.muted:C.text,border:`1px solid ${d?C.border:C.primary}`,borderRadius:"7px",padding:"12px 24px",fontSize:"14px",fontWeight:500,cursor:d?"not-allowed":"pointer",letterSpacing:"0.04em",transition:"all 0.2s"});
const bGhost = {background:"transparent",color:C.muted,border:`1px solid ${C.border}`,borderRadius:"7px",padding:"11px 20px",fontSize:"13px",cursor:"pointer"};

function ApiKeyScreen({ onSubmit }) {
  const [key,setKey]=useState(""); const [vis,setVis]=useState(false);
  return (
    <div style={{animation:"fadeUp 0.4s ease"}}>
      <p style={{fontSize:"clamp(22px,4vw,34px)",fontWeight:200,lineHeight:1.3,marginBottom:"12px"}}>Anthropic API-Key</p>
      <p style={{fontSize:"13px",color:C.muted,marginBottom:"32px",lineHeight:1.6}}>
        Der Key wird nur im Arbeitsspeicher dieser Session gehalten – niemals gespeichert oder übertragen.<br/>
        Du brauchst einen Key von <a href="https://console.anthropic.com/settings/keys" target="_blank" style={{color:C.primary,textDecoration:"none"}}>console.anthropic.com</a>.
      </p>
      <div style={{position:"relative"}}>
        <input type={vis?"text":"password"} placeholder="sk-ant-api03-..." value={key} onChange={e=>setKey(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&key.trim())onSubmit(key.trim());}} style={{...iStyle,paddingRight:"80px",fontSize:"13px",fontFamily:"monospace",letterSpacing:"0.04em"}} onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.border} autoFocus />
        <button onClick={()=>setVis(!vis)} style={{position:"absolute",right:"12px",top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:"11px",letterSpacing:"0.06em"}}>{vis?"HIDE":"SHOW"}</button>
      </div>
      <div style={{display:"flex",justifyContent:"flex-end",marginTop:"14px"}}>
        <button onClick={()=>onSubmit(key.trim())} disabled={!key.trim()} style={bPrimary(!key.trim())}>Weiter →</button>
      </div>
    </div>
  );
}

function App() {
  const [apiKey,setApiKey]=useState("");
  const [phase,setPhase]=useState("hero");
  const [started,setStarted]=useState(false);
  const [input,setInput]=useState("");
  const [analysis,setAnalysis]=useState(null);
  const [answers,setAnswers]=useState({});
  const [output,setOutput]=useState(null);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null);
  const [copied,setCopied]=useState(false);
  const [rating,setRating]=useState(null);
  const [fbComment,setFbComment]=useState("");
  const [fbDone,setFbDone]=useState(false);
  const [debugLog,setDebugLog]=useState([]);
  const [showDebug,setShowDebug]=useState(false);
  const log=(msg)=>setDebugLog(prev=>[...prev,`${new Date().toLocaleTimeString()}  ${msg}`]);

  const {displayed,done}=useTypewriter("Was soll nach diesem\nGespräch anders sein\nals vorher?",32,started);

  useEffect(()=>{
    if(phase!=="hero")return;
    const t=setTimeout(()=>setStarted(true),500);
    return ()=>clearTimeout(t);
  },[phase]);

  const handleKey=(k)=>{setApiKey(k);setPhase("hero");};

  const analyzeIntent=async()=>{
    if(!input.trim()||loading)return;
    setLoading(true);setError(null);
    log(`▶ analyzeIntent gestartet — Input: "${input.slice(0,80)}"`);
    try{
      const r=await callClaude(
        `Du bist Layer-0 eines Intent-Analyse-Systems. Analysiere die Nutzeraussage. Antworte NUR mit gültigem JSON ohne Backticks oder Erklärungen:\n{"intent_clarity":Zahl0bis100,"domain":"technisch|kreativ|strategisch|persönlich|analytisch","questions":[{"id":1,"text":"Klärungsfrage"},{"id":2,"text":"Klärungsfrage"}]}`,
        `Nutzeraussage: "${input}"`,
        log
      );
      setAnalysis(r);setPhase("questions");
      log("✓ Intent-Analyse erfolgreich");
    }catch(e){setError(`Fehler: ${e.message}`);log(`✗ ABGEFANGEN: ${e.message}`);}
    setLoading(false);
  };

  const buildOutput=async()=>{
    setLoading(true);setPhase("processing");
    log("▶ buildOutput gestartet");
    const cl=analysis.questions.map(q=>`F: ${q.text}\nA: ${answers[q.id]||"–"}`).join("\n\n");
    try{
      const r=await callClaude(
        `Du bist ein LRP-Prompt-Generator. Antworte NUR mit gültigem JSON ohne Backticks:\n{"intent_statement":"1-2 Sätze präzise Zielformulierung","ready_prompt":"vollständiger optimierter Prompt für ein LLM","recommended_approach":"kurze Empfehlung welches LLM/Tool am besten passt"}`,
        `Ursprüngliche Aussage: "${input}"\n\nKlärungen:\n${cl}`,
        log
      );
      setOutput(r);setPhase("output");
      log("✓ Output erfolgreich generiert");
    }catch(e){setError("Generierung fehlgeschlagen.");setPhase("questions");log(`✗ ABGEFANGEN: ${e.message}`);}
    setLoading(false);
  };

  const submitFeedback=()=>{
    const lbl={precise:"🎯 Präzise",partial:"🔄 Anpassung nötig",miss:"❌ Daneben"}[rating];
    const body=[`**Bewertung:** ${lbl}`,`**Intent:** ${input}`,fbComment?`**Kommentar:** ${fbComment}`:null,`**Generierter Prompt:**\n\`\`\`\n${output?.ready_prompt}\n\`\`\``].filter(Boolean).join("\n\n");
    window.open(`https://github.com/IrsanAI/LRP-v1.3/issues/new?title=${encodeURIComponent("Feedback: "+lbl)}&body=${encodeURIComponent(body)}&labels=feedback`,"_blank");
    setFbDone(true);
  };

  const reset=()=>{
    setPhase("hero");setInput("");setAnalysis(null);setAnswers({});
    setOutput(null);setError(null);setRating(null);setFbComment("");setFbDone(false);
    setStarted(false);setTimeout(()=>setStarted(true),100);
  };

  const allAnswered=analysis?.questions.every(q=>answers[q.id]?.trim());

  return (
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'Inter',system-ui,sans-serif",display:"flex",flexDirection:"column"}}>
      <div style={{padding:"14px 24px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,background:C.bg,zIndex:10}}>
        <span style={{fontSize:"13px",fontWeight:700,letterSpacing:"0.18em",color:C.primary}}>IRSANAI</span>
        <span style={{fontSize:"11px",color:C.muted,letterSpacing:"0.12em"}}>LAYER·0 · INTENT CLARITY</span>
        {phase!=="apikey" && (
          <div style={{display:"flex",gap:"8px"}}>
            {phase!=="hero"&&<button onClick={reset} style={{...bGhost,padding:"6px 14px",fontSize:"11px"}}>Reset</button>}
            <button onClick={()=>{setApiKey("");setPhase("apikey");setStarted(false);}} style={{...bGhost,padding:"6px 14px",fontSize:"11px",color:C.danger,borderColor:C.danger+"50"}}>API-Key</button>
          </div>
        )}
      </div>

      <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:"32px 24px"}}>
        <div style={{width:"100%",maxWidth:"600px"}}>

          {phase==="apikey" && <ApiKeyScreen onSubmit={handleKey} />}

          {phase==="hero" && (
            <div>
              <pre style={{fontFamily:"'Inter',system-ui",whiteSpace:"pre-wrap",fontSize:"clamp(26px,5vw,44px)",fontWeight:200,lineHeight:1.25,color:C.text,margin:"0 0 48px 0",minHeight:"130px",letterSpacing:"-0.01em"}}>
                {displayed}{!done&&<span style={{color:C.primary,animation:"blink 1s infinite"}}>|</span>}
              </pre>
              {done && (
                <div style={{animation:"fadeUp 0.4s ease"}}>
                  <textarea autoFocus rows={4} placeholder="Beschreibe deinen gewünschten Zustand — so frei wie du willst..." value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&(e.metaKey||e.ctrlKey))analyzeIntent();}} style={{...iStyle,resize:"vertical"}} onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.border} />
                  {error&&<p style={{color:C.danger,fontSize:"13px",marginTop:"8px"}}>{error}</p>}
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:"16px"}}>
                    <span style={{fontSize:"12px",color:C.muted}}>⌘/Ctrl + Enter</span>
                    <button onClick={analyzeIntent} disabled={!input.trim()||loading} style={bPrimary(!input.trim()||loading)}>{loading?"Analysiere ...":"Intent klären →"}</button>
                  </div>
                </div>
              )}
            </div>
          )}

          {phase==="questions" && analysis && (
            <div style={{animation:"fadeUp 0.3s ease"}}>
              <div style={{display:"flex",alignItems:"center",gap:"14px",marginBottom:"8px"}}>
                <Waveform clarity={analysis.intent_clarity} />
                <span style={{fontSize:"12px",color:C.muted}}>Intent-Klarheit: <span style={{color:C.primary,fontWeight:600}}>{analysis.intent_clarity}%</span></span>
              </div>
              <div style={{height:"1px",background:C.border,marginBottom:"28px"}} />
              <p style={{fontSize:"11px",color:C.muted,letterSpacing:"0.14em",marginBottom:"24px"}}>KLÄRUNGSFRAGEN · {analysis.domain?.toUpperCase()}</p>
              {analysis.questions.map((q,i) => (
                <div key={q.id} style={{marginBottom:"24px"}}>
                  <label style={{display:"block",fontSize:"15px",lineHeight:1.5,marginBottom:"10px"}}>
                    <span style={{color:C.primary,marginRight:"10px",fontWeight:600}}>{i+1}</span>{q.text}
                  </label>
                  <textarea rows={2} placeholder="Deine Antwort..." value={answers[q.id]||""} onChange={e=>setAnswers(p=>({...p,[q.id]:e.target.value}))} style={{...iStyle,resize:"vertical"}} onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.border} />
                </div>
              ))}
              {error&&<p style={{color:C.danger,fontSize:"13px",marginBottom:"12px"}}>{error}</p>}
              <div style={{display:"flex",gap:"12px"}}>
                <button onClick={reset} style={bGhost}>← Zurück</button>
                <button onClick={buildOutput} disabled={!allAnswered||loading} style={{...bPrimary(!allAnswered||loading),flex:1}}>{loading?"Generiere ...":"Intent formalisieren →"}</button>
              </div>
            </div>
          )}

          {phase==="processing" && (
            <div style={{textAlign:"center",padding:"80px 0"}}>
              <div style={{display:"flex",justifyContent:"center",marginBottom:"24px"}}><Waveform clarity={72} /></div>
              <p style={{color:C.muted,fontSize:"13px",letterSpacing:"0.14em"}}>FORMALISIERE INTENT ...</p>
            </div>
          )}

          {phase==="output" && output && (
            <div style={{animation:"fadeUp 0.3s ease"}}>
              <div style={{display:"flex",alignItems:"center",gap:"14px",marginBottom:"8px"}}>
                <Waveform clarity={95} />
                <span style={{fontSize:"12px",color:C.muted}}>Intent-Klarheit: <span style={{color:C.teal,fontWeight:600}}>95%</span></span>
              </div>
              <div style={{height:"1px",background:C.border,marginBottom:"28px"}} />

              <div style={{background:C.surfaceHigh,border:`1px solid ${C.border}`,borderRadius:"8px",padding:"20px",marginBottom:"14px"}}>
                <p style={{fontSize:"11px",color:C.primary,letterSpacing:"0.14em",marginBottom:"10px"}}>FORMALISIERTER INTENT</p>
                <p style={{fontSize:"15px",lineHeight:1.65,margin:0}}>{output.intent_statement}</p>
              </div>

              <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:"8px",padding:"20px",marginBottom:"14px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>
                  <p style={{fontSize:"11px",color:C.primary,letterSpacing:"0.14em",margin:0}}>LRP-READY PROMPT</p>
                  <button onClick={()=>{navigator.clipboard.writeText(output.ready_prompt);setCopied(true);setTimeout(()=>setCopied(false),2000);}} style={{background:copied?C.teal:"transparent",color:copied?C.bg:C.muted,border:`1px solid ${copied?C.teal:C.border}`,borderRadius:"5px",padding:"5px 14px",fontSize:"12px",cursor:"pointer",transition:"all 0.2s"}}>{copied?"✓ Kopiert":"Kopieren"}</button>
                </div>
                <pre style={{fontFamily:"monospace",fontSize:"13px",lineHeight:1.65,color:"#C4CCEC",whiteSpace:"pre-wrap",wordBreak:"break-word",margin:0}}>{output.ready_prompt}</pre>
              </div>

              {output.recommended_approach && (
                <div style={{background:`${C.accent}12`,border:`1px solid ${C.accent}35`,borderRadius:"8px",padding:"16px",marginBottom:"14px"}}>
                  <p style={{fontSize:"11px",color:C.accent,letterSpacing:"0.14em",marginBottom:"8px"}}>EMPFEHLUNG</p>
                  <p style={{fontSize:"13px",lineHeight:1.6,margin:0}}>{output.recommended_approach}</p>
                </div>
              )}

              <div style={{borderTop:`1px solid ${C.border}`,paddingTop:"24px",marginBottom:"16px"}}>
                {!fbDone ? (
                  <>
                    <p style={{fontSize:"11px",color:C.muted,letterSpacing:"0.14em",marginBottom:"14px"}}>WIE WAR DER PROMPT?</p>
                    <div style={{display:"flex",gap:"8px",marginBottom:"16px"}}>
                      {[{key:"precise",label:"🎯 Präzise",color:C.teal},{key:"partial",label:"🔄 Anpassung nötig",color:C.accent},{key:"miss",label:"❌ Daneben",color:C.danger}].map(opt=>(
                        <button key={opt.key} onClick={()=>setRating(opt.key)} style={{flex:1,padding:"9px 6px",fontSize:"12px",borderRadius:"6px",cursor:"pointer",border:`1px solid ${rating===opt.key?opt.color:C.border}`,background:rating===opt.key?`${opt.color}18`:"transparent",color:rating===opt.key?opt.color:C.muted,transition:"all 0.2s",fontWeight:rating===opt.key?600:400}}>{opt.label}</button>
                      ))}
                    </div>
                    {rating && (
                      <div style={{animation:"fadeUp 0.25s ease"}}>
                        <textarea rows={2} placeholder="Optional: Was hätte besser passen können?" value={fbComment} onChange={e=>setFbComment(e.target.value)} style={{...iStyle,fontSize:"13px",marginBottom:"10px",resize:"vertical"}} onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.border} />
                        <button onClick={submitFeedback} style={{...bGhost,width:"100%",textAlign:"center"}}>Feedback abgeben → GitHub Issue</button>
                        <p style={{fontSize:"11px",color:C.muted,marginTop:"8px",textAlign:"center"}}>Öffnet ein vorausgefülltes Issue im IrsanAI-Repo</p>
                      </div>
                    )}
                  </>
                ) : (
                  <p style={{fontSize:"14px",color:C.teal,textAlign:"center",padding:"8px 0"}}>✓ Danke – das hilft dem System.</p>
                )}
              </div>

              <button onClick={reset} style={{...bGhost,width:"100%",textAlign:"center"}}>← Neuer Intent</button>
            </div>
          )}

        </div>
      </div>

      <div style={{padding:"12px 24px",borderTop:`1px solid ${C.border}`,textAlign:"center"}}>
        <span style={{fontSize:"11px",color:C.muted,letterSpacing:"0.1em"}}>IrsanAI Layer-0 · Beta · github.com/IrsanAI/LRP-v1.3</span>
      </div>

      {/* DEBUG PANEL */}
      <button onClick={()=>setShowDebug(!showDebug)} style={{
        position:"fixed",bottom:"16px",right:"16px",zIndex:50,
        width:"44px",height:"44px",borderRadius:"50%",
        background: debugLog.some(l=>l.includes("✗")) ? C.danger : C.surfaceHigh,
        border:`1px solid ${C.border}`,color:"#fff",fontSize:"18px",
        cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",
        boxShadow:"0 2px 10px rgba(0,0,0,0.4)",
      }}>🐛</button>

      {showDebug && (
        <div style={{
          position:"fixed",bottom:"68px",right:"16px",left:"16px",maxWidth:"560px",
          margin:"0 auto",maxHeight:"60vh",zIndex:50,
          background:C.surfaceHigh,border:`1px solid ${C.border}`,borderRadius:"10px",
          display:"flex",flexDirection:"column",boxShadow:"0 4px 24px rgba(0,0,0,0.5)",
        }}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",borderBottom:`1px solid ${C.border}`}}>
            <span style={{fontSize:"11px",color:C.muted,letterSpacing:"0.1em"}}>DEBUG-LOG ({debugLog.length})</span>
            <div style={{display:"flex",gap:"8px"}}>
              <button onClick={()=>{navigator.clipboard.writeText(debugLog.join("\n"));}} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,borderRadius:"5px",padding:"3px 10px",fontSize:"11px",cursor:"pointer"}}>Kopieren</button>
              <button onClick={()=>setDebugLog([])} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,borderRadius:"5px",padding:"3px 10px",fontSize:"11px",cursor:"pointer"}}>Leeren</button>
            </div>
          </div>
          <div style={{overflowY:"auto",padding:"12px 14px",fontFamily:"monospace",fontSize:"11px",lineHeight:1.6,color:"#C4CCEC"}}>
            {debugLog.length===0
              ? <span style={{color:C.muted}}>Noch keine Einträge — löse einen Intent aus.</span>
              : debugLog.map((l,i)=>(
                  <div key={i} style={{
                    color: l.includes("✗") ? C.danger : l.includes("✓") ? C.teal : "#C4CCEC",
                    marginBottom:"6px", wordBreak:"break-word",
                  }}>{l}</div>
                ))
            }
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
